query listShops {
    listShops {
      underPrice
      status
      title
      type
      uniqueId
    }
}

mutation CreateShop($title: String!,$style: String,$type: String,$underPrice: Float,$branches: [InputBranch]!) {
    createShop(title: $title,style: $style,type: $type,underPrice: $underPrice,branches: $branches) {
        uniqueId
        title
        style
        type
        status
        underPrice
        branches {
            uniqueId
            orderId
            name
            openTime
            closedTime
            tel
            address {
                ownerType
                completeInfo
                nation
                isoNationCode
                locality
                subLocality
                administrativeArea
                subAdministrativeArea
                postalCode
                thoroughfare
                subThoroughfare
                latitude
                longitude
                annotation
            }
        }
    }
}

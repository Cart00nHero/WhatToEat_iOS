
mutation CreateFoodie($email: String!, $gender: Int, $name: String!, $token: InputToken!) {
    createFoodie(email: $email, gender: $gender,name: $name, token:$token) {
        email
        name
        gender
        token {
          type
          token
        }
    }
}

mutation CreateLocation(
  $address: InputAddress!,
  $shopBranch:InputBranch!
) {
  createLocation(address:$address,shopBranch: $shopBranch) {
    ownerType
    completeInfo
    fullInfo
    postalCode
    nation
    isoNationCode
    locality
    subLocality
    administrativeArea
    subAdministrativeArea
    thoroughfare
    subThoroughfare
    floor
    latitude
    longitude
    annotation
    shopBranch{
      uniqueId
      orderId
      name
      openTime
      closedTime
      tel
      shop{
        uniqueId
        title
        style
        type
        underPrice
        status
      }
    }
  }
}
mutation CreateShop($title: String!,$style: String,$type: String,$underPrice: Float,$branches: [InputBranch]!) {
    createShop(title: $title,style: $style,type: $type,underPrice: $underPrice,branches: $branches) {
        uniqueId
        title
        style
        type
        status
        underPrice
        branches {
            uniqueId
            orderId
            name
            openTime
            closedTime
            tel
            address {
                ownerType
                completeInfo
                fullInfo
                nation
                isoNationCode
                locality
                subLocality
                administrativeArea
                subAdministrativeArea
                postalCode
                thoroughfare
                subThoroughfare
                latitude
                longitude
                annotation
            }
        }
    }
}

query LocationsDynamicQuery($whereAnd: AddressDqCmd!) {
  locationsDynamicQuery(whereAnd: $whereAnd) {
    ownerType
    completeInfo
    fullInfo
    postalCode
    nation
    isoNationCode
    locality
    subLocality
    administrativeArea
    subAdministrativeArea
    thoroughfare
    subThoroughfare
    floor
    latitude
    longitude
    annotation
    shopBranch{
      uniqueId
      orderId
      name
      openTime
      closedTime
      tel
      shop{
        uniqueId
        title
        style
        type
        underPrice
        status
      }
    }
  }
}

query LocationsDynamicQuery($foodieId: String,$whereAnd: AddressDqCmd!) {
  locationsDynamicQuery(foodieId:$foodieId,whereAnd: $whereAnd) {
    ownerType
    completeInfo
    fullInfo
    postalCode
    nation
    isoNationCode
    locality
    subLocality
    administrativeArea
    subAdministrativeArea
    thoroughfare
    subThoroughfare
    floor
    latitude
    longitude
    annotation
    shopBranch{
      uniqueId
      orderId
      name
      openTime
      closedTime
      tel
      shop{
        uniqueId
        title
        style
        type
        underPrice
        status
      }
    }
  }
}

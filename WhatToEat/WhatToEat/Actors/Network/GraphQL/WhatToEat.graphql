
mutation CreateFoodie($email: String!, $gender: Int, $name: String!, $token: InputToken!) {
  createFoodie(email: $email, gender: $gender,name: $name, token:$token) {
    email
    name
    gender
    token {
      type
      token
    }
  }
}

mutation CreateGourmet(
  $foodieId: String!,
  $address: InputAddress!,
  $shopBranch:InputBranch!,
  $shop:InputShop!
) {
  createGourmet(foodieId:$foodieId,address:$address,shopBranch: $shopBranch,shop:$shop) {
    uniqueId
    orderId
    name
    openTime
    closedTime
    tel
    shop{
      uniqueId
      title
      style
      type
      underPrice
      status
    }
    address{
      ownerType
      completeInfo
      fullInfo
      postalCode
      nation
      isoNationCode
      locality
      subLocality
      administrativeArea
      subAdministrativeArea
      thoroughfare
      subThoroughfare
      floor
      latitude
      longitude
      annotation
    }
  }
}

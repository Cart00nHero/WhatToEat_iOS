
mutation CreateFoodie($email: String!, $gender: Int, $name: String!, $token: InputToken!) {
    createFoodie(email: $email, gender: $gender,name: $name, token:$token) {
        email
        name
        gender
        token {
          type
          token
        }
    }
}

mutation CreateLocation(
  $address: InputAddress!,
  $shopBranch:InputBranch!,
  $shop:InputShop!
) {
  createLocation(address:$address,shopBranch: $shopBranch,shop:$shop) {
    ownerType
    completeInfo
    fullInfo
    postalCode
    nation
    isoNationCode
    locality
    subLocality
    administrativeArea
    subAdministrativeArea
    thoroughfare
    subThoroughfare
    floor
    latitude
    longitude
    annotation
    shopBranch{
      uniqueId
      orderId
      name
      openTime
      closedTime
      tel
      shop{
        uniqueId
        title
        style
        type
        underPrice
        status
      }
    }
  }
}

query LocationsDynamicQuery($whereAnd: AddressDqCmd!) {
  locationsDynamicQuery(whereAnd: $whereAnd) {
    ownerType
    completeInfo
    fullInfo
    postalCode
    nation
    isoNationCode
    locality
    subLocality
    administrativeArea
    subAdministrativeArea
    thoroughfare
    subThoroughfare
    floor
    latitude
    longitude
    annotation
    shopBranch{
      uniqueId
      orderId
      name
      openTime
      closedTime
      tel
      shop{
        uniqueId
        title
        style
        type
        underPrice
        status
      }
    }
  }
}
